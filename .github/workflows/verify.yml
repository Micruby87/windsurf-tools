name: Verify

on:
  push:
    branches:
      - main
      - master
      - 'feat/**'
      - 'fix/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Go + Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.5'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      # 前端必须先构建：main.go 用 //go:embed all:frontend/dist 嵌入产物，
      # 否则 go vet / go build 会因为 frontend/dist 不存在而失败。
      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go tests with race detector
        run: go test -race -count=1 -timeout=180s ./...

      - name: Diff hygiene
        run: git diff --check
